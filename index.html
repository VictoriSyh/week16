<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма регистрации</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>Регистрация пользователя</h1>
        <form id="registrationForm">
            <div class="form-group">
                <label for="name">Имя:</label>
                <input type="text" id="name" placeholder="Введите ваше имя" required pattern="[A-Za-zА-Яа-яЁё\s]{2,20}">
                <span class="error-message" id="nameError"></span>
            </div>

            <div class="form-group">
                <label for="email">Электронная почта:</label>
                <input type="email" id="email" placeholder="Введите вашу электронную почту" required>
                <span class="error-message" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="age">Возраст:</label>
                <input type="number" id="age" placeholder="Введите ваш возраст" required min="1">
                <span class="error-message" id="ageError"></span>
            </div>

            <div class="form-group">
                <label>Пол:</label>
                <label><input type="radio" name="gender" value="male"> Мужчина</label>
                <label><input type="radio" name="gender" value="female"> Женщина</label>
            </div>

            <div class="form-group">
                <label for="profession">Профессия:</label>
                <select id="profession" required>
                    <option value="" disabled selected hidden>Выберите профессию</option>
                    <option value="doctor">Врач</option>
                    <option value="programmer">Программист</option>
                    <option value="teacher">Учитель</option>
                    <option value="designer">Дизайнер</option>
                    <option value="engineer">Инженер</option>
                    <option value="seller">Продавец</option>
                    <option value="other">Другое</option>
                </select>
                <span class="error-message" id="professionError"></span>
            </div>

            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" placeholder="Введите пароль (не менее 8 символов)" required minlength=8 pattern=(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}>
                <span class='error-message' id='passwordError'></span> 
            </div>

            <div class='form-group'>
             	<label><input type='checkbox' id='consent' required> Согласен с обработкой данных</label> 
             	<span class='error-message' id='consentError'></span> 
             </div>

           	<button type='submit' id='submitBtn' disabled>Отправить</button> 
        </form> 
    </div>
  
    <script src="/Js.js"></script> 
</body> 
</html>
